name: Trigger Jenkins Job Email Microservice

on:
  push:
    branches:
      - main-email-notification
  workflow_dispatch:

jobs:
  trigger-job:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Jenkins Job
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          JENKINS_URL="https://automation.prms.cgiar.org/job/microservice-email-notifications-prod/buildWithParameters"

          echo "Triggering Jenkins for branch: ${BRANCH_NAME}"

          curl --fail -X POST "${JENKINS_URL}" \
            --user "${JENKINS_USERNAME}:${JENKINS_API_TOKEN}" \
            --data-urlencode "GIT_BRANCH=${BRANCH_NAME}"
        env:
          JENKINS_USERNAME: ${{ secrets.JENKINS_USERNAME }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
