openapi: 3.0.3
info:
  title: Reports Microservice - PDF URL Generation API
  version: 1.0.0
  description: URL-based PDF generation endpoints (Gotenberg flow)

paths:
  /generate-url:
    post:
      summary: Generate PDF from URL template
      description: |
        Accepts JSON data and template name, constructs URL, sends to Gotenberg,
        uploads PDF to S3, returns S3 URL.
        Requires authentication via `auth` header (CLARISA JWT).
      operationId: generatePdfFromUrl
      tags:
        - PDF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePdfUrlDto'
      responses:
        '200':
          description: PDF generated and uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdfUrlResponse'
        '400':
          description: Invalid input (template, URL, or validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
        '401':
          description: Unauthorized (missing or invalid auth)
        '500':
          description: Conversion or storage failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

components:
  schemas:
    CreatePdfUrlDto:
      type: object
      required:
        - data
        - templateName
        - bucketName
        - fileName
      properties:
        data:
          type: object
          additionalProperties: true
          description: Key-value pairs for URL query parameters
        templateName:
          type: string
          minLength: 1
          description: Template identifier (e.g., "001" maps to /001)
        bucketName:
          type: string
          minLength: 1
          description: S3 bucket name
        fileName:
          type: string
          minLength: 1
          description: S3 object key (file name)

    PdfUrlResponse:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: S3 URL to retrieve the generated PDF

    ServerError:
      type: object
      properties:
        description:
          type: string
        status:
          type: integer
        errors:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string
